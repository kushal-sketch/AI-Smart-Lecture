{% extends "layout.html" %}
{% block title %}Sign up — LectureMind{% endblock %}
{% block content %}

<div class="upload-shell">
  <span class="eyebrow">Get started</span>
  <h1 style="font-size:2rem; margin-bottom:.5rem;">Create your account</h1>
  <p style="margin-bottom:2rem;">Free — turn your lecture recordings into notes, quizzes and flashcards.</p>

  <form class="card" method="POST" action="{{ url_for('signup') }}">
    <div class="form-group">
      <label class="form-label" for="username">Username</label>
      <input class="form-control" type="text" id="username" name="username" required autofocus>
    </div>

    <div class="form-group">
      <label class="form-label" for="email">Email</label>
      <input class="form-control" type="email" id="email" name="email" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Password</label>
      <input class="form-control" type="password" id="password" name="password" minlength="6" required>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm_password">Confirm password</label>
      <input class="form-control" type="password" id="confirm_password" name="confirm_password" minlength="6" required>
    </div>

    <button type="submit" class="btn btn-primary btn-block">Create account</button>

    <p style="margin-top:1.2rem; font-size:.9rem; text-align:center;">
      Already have an account? <a href="{{ url_for('login') }}">Log in</a>
    </p>
  </form>
</div>

{% endblock %}
