{% extends "layout.html" %}
{% block title %}Transcript — {{ lecture.lecture_name }}{% endblock %}
{% block content %}

<span class="eyebrow">{{ lecture.language|upper }} · {{ lecture.created_at }}</span>
<h1 style="font-size:1.9rem; margin-bottom:1.4rem;">{{ lecture.lecture_name }}</h1>

<div class="lecture-subnav">
  <a href="{{ url_for('transcript_page', lecture_id=lecture.id) }}" class="active">Transcript</a>
  <a href="{{ url_for('notes_page', lecture_id=lecture.id) }}">Notes</a>
  <a href="{{ url_for('quiz_page', lecture_id=lecture.id) }}">Quiz</a>
  <a href="{{ url_for('flashcards_page', lecture_id=lecture.id) }}">Flashcards</a>
  <a href="{{ url_for('report_page', lecture_id=lecture.id) }}">Report</a>
</div>

<div class="card-paper">
  <div class="prose-block" style="white-space: pre-wrap;">{{ transcript }}</div>
</div>

{% endblock %}
